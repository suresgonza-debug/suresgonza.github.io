<!DOCTYPE html>
<html>
<head>
  <title>Ruleta de Retos</title>

  <!-- Aquí va TODO el estilo CSS -->
  <style>
    body {
      font-family: 'Arial', sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: #333;
    }
    button {
      background-color: #ff6b6b;
      color: white;
      border: none;
      padding: 15px 25px;
      font-size: 18px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background-color: #ff3b3b;
    }
    #resultado {
      font-size: 24px;
      margin-top: 20px;
      font-weight: bold;
    }
  </style>

</head>
<body>

  <h1>🎡 Ruleta de Retos 🎡</h1>

  <!-- Botón que activa la ruleta -->
  <button onclick="girarRuleta()">Girar ruleta</button>

  <!-- Aquí aparecerá el reto -->
  <p id="resultado"></p>

  <!-- Aquí va TODO el JavaScript -->
  <script>
    // Lista de retos
    let retos = [
      "Haz 10 flexiones",
      "Canta una canción",
      "Manda un mensaje raro",
      "Baila durante 10 segundos",
      "Di algo gracioso",
      "Salta 5 veces",
      "Dibuja un animal en 1 minuto",
      "Imita a tu personaje de anime favorito"
    ];

    // Función para animar el “giro”
    function girarRuleta() {
      let total = retos.length;
      let vueltas = 20; // cuántas veces gira antes de parar
      let i = 0;

      const intervalo = setInterval(() => {
        document.getElementById("resultado").innerText = retos[i % total];
        i++;
        if (i > vueltas) clearInterval(intervalo);
      }, 100); // velocidad del giro
    }
  </script>

</body>
</html>
